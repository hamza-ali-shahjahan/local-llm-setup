<!doctype html>
<html>
<head><meta charset="utf-8"><title>Disrupt — JS-rendered</title></head>
<!-- A JS-RENDERED page: the raw HTML below is an empty shell (just #root + a
     script). A stdlib HTML parse therefore sees NO headings, sections, colours,
     fonts or animations. Only a real browser render exposes them — which is the
     whole point of the Playwright inspect path. -->
<body>
  <div id="root"></div>
  <script>
    var s = document.createElement('style');
    s.textContent = [
      ':root{--brand:#e91e63}',
      'body{font-family:Inter,system-ui,sans-serif;background:#0b0b10;color:#f5f5f7;margin:0}',
      '.hero{background:#e91e63;padding:40px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.4)}',
      '.btn{background:#222222;color:#ffffff;border-radius:8px;transition:background .2s ease}',
      '.btn:hover{background:#e91e63}',
      '@keyframes floaty{from{transform:translateY(0)}to{transform:translateY(-10px)}}',
      '.badge{animation:floaty 2s ease-in-out infinite}'
    ].join('\n');
    document.head.appendChild(s);
    document.getElementById('root').innerHTML =
      '<header><nav><a href="#">Home</a><a href="#">Docs</a><a href="#">Pricing</a></nav></header>' +
      '<main>' +
        '<section class="hero"><h1>Disrupt the status quo</h1>' +
          '<p class="badge">shipping now</p>' +
          '<button class="btn">Get started</button></section>' +
        '<section id="features"><h2>Features</h2><p>Fast, local, private.</p></section>' +
        '<section id="pricing"><h2>Pricing</h2></section>' +
      '</main>' +
      '<footer><h3>Disrupt, Inc.</h3></footer>';
  </script>
</body>
</html>
